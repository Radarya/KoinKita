<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoinKita Feature Graphic Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; text-align: center; padding: 20px; color: white; }
        canvas {
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 800px;
            max-width: 100%;
            margin-bottom: 10px;
        }
        .controls { margin-bottom: 30px; }
        button {
            margin: 5px; background: #ff4757; color: white; border: none;
            padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 25px;
            cursor: pointer; box-shadow: 0 4px 0 #c0392b; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #c0392b; }
        .btn-en { background: #3742fa; box-shadow: 0 4px 0 #2f3542; }
        .btn-en:active { box-shadow: 0 0 0 #2f3542; }
        h1 { margin-bottom: 5px; }
        p { color: #bdc3c7; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Feature Graphic (1024x500)</h1>
    <p>Revisi: Memperbaiki ukuran kotak "Game Literasi Keuangan" agar pas dengan teks.</p>
    
    <div class="controls">
        <button onclick="downloadCanvas('id')">Download Versi ID 🇮🇩</button>
        <button class="btn-en" onclick="downloadCanvas('en')">Download Versi EN 🇺🇸</button>
    </div>

    <div>
        <h3>Versi Indonesia</h3>
        <canvas id="bannerID" width="1024" height="500"></canvas>
    </div>
    
    <div style="margin-top: 40px;">
        <h3>Versi English</h3>
        <canvas id="bannerEN" width="1024" height="500"></canvas>
    </div>

    <script>
        const imgIDFile = "Screenshot_20260712-154047.png"; 
        const imgENFile = "Screenshot_20260712-154042.png"; 

        function drawPremiumBackground(ctx) {
            const grad = ctx.createLinearGradient(0, 0, 1024, 500);
            grad.addColorStop(0, "#1A2980");
            grad.addColorStop(1, "#26D0CE");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 500);

            ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
            ctx.beginPath();
            ctx.moveTo(1024, 500);
            ctx.lineTo(400, 500);
            ctx.quadraticCurveTo(700, 200, 1024, 100);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(1024, 500);
            ctx.lineTo(600, 500);
            ctx.quadraticCurveTo(800, 300, 1024, 250);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 1;
            for (let i = 0; i < 500; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 500); ctx.stroke();
            }
            for (let j = 0; j < 500; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(500, j); ctx.stroke();
            }
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
        }

        function drawBanner(canvasId, imgSrc, title, subtitle1, subtitle2, badgeText) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = imgSrc;
            
            img.onload = () => {
                drawPremiumBackground(ctx);

                const phoneW = 260;
                const phoneH = 500; 
                const phoneX = 80;
                const phoneY = 40;

                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur = 30;
                ctx.shadowOffsetY = 15;
                ctx.fillStyle = "#1e272e"; 
                roundRect(ctx, phoneX, phoneY, phoneW, phoneH, 35);
                ctx.fill();
                ctx.shadowColor = "transparent";

                ctx.save();
                roundRect(ctx, phoneX+10, phoneY+10, phoneW-20, phoneH-20, 26);
                ctx.clip();
                
                const imgRatio = img.width / img.height;
                const drawH = (phoneW-20) / imgRatio;
                ctx.drawImage(img, phoneX+10, phoneY+10, phoneW-20, drawH);
                
                ctx.fillStyle = "black";
                roundRect(ctx, phoneX + (phoneW/2) - 50, phoneY + 18, 100, 26, 13);
                ctx.fill();
                ctx.restore();

                const textStartX = 400; 
                ctx.textAlign = "left";
                ctx.textBaseline = "top";
                
                // Dynamic Badge Width
                ctx.font = "bold 18px 'Segoe UI'";
                const textWidth = ctx.measureText(badgeText).width;
                const badgeWidth = textWidth + 40; // 20px padding left and right

                ctx.fillStyle = "#F5A623"; 
                roundRect(ctx, textStartX, 110, badgeWidth, 45, 22);
                ctx.fill();
                
                ctx.fillStyle = "#ffffff";
                ctx.fillText(badgeText, textStartX + 20, 122);

                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
                ctx.fillStyle = "white";
                ctx.font = "bold 90px 'Arial Black', Impact, sans-serif";
                ctx.fillText("KoinKita", textStartX, 170);
                
                ctx.font = "bold 40px 'Segoe UI', Arial, sans-serif";
                ctx.fillStyle = "#F8E71C"; 
                ctx.fillText(title, textStartX, 290);
                
                ctx.fillStyle = "white";
                ctx.font = "32px 'Segoe UI', Arial, sans-serif";
                ctx.fillText(subtitle1, textStartX, 350);
                ctx.fillText(subtitle2, textStartX, 400);
                
                ctx.shadowColor = "transparent";
            };
        }

        drawBanner(
            'bannerID', 
            imgIDFile, 
            "Keputusan Finansialmu!", 
            "Simulasi seru menghadapi resiko", 
            "dan peluang keuangan nyata.",
            "🎮 GAME LITERASI KEUANGAN"
        );

        drawBanner(
            'bannerEN', 
            imgENFile, 
            "Your Financial Choices!", 
            "A fun simulation of real-world", 
            "financial risks & opportunities.",
            "🎮 FINANCIAL LITERACY GAME"
        );

        function downloadCanvas(lang) {
            try {
                const canvas = document.getElementById(lang === 'id' ? 'bannerID' : 'bannerEN');
                const link = document.createElement('a');
                link.download = `Feature_Graphic_${lang.toUpperCase()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert("Gagal mengunduh karena alasan keamanan browser. Buka via localhost:8080");
            }
        }
    </script>
</body>
</html>
