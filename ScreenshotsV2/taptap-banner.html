<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapTap Cover Image Generator (1920x1080)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; text-align: center; padding: 20px; color: white; }
        canvas {
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 800px; /* Ditampilkan lebih kecil di layar */
            max-width: 100%;
            margin-bottom: 30px;
        }
        .controls { margin-bottom: 30px; }
        button {
            margin: 5px; background: #ff4757; color: white; border: none;
            padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 25px;
            cursor: pointer; box-shadow: 0 4px 0 #c0392b; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #c0392b; }
        .btn-en { background: #3742fa; box-shadow: 0 4px 0 #2f3542; }
        .btn-en:active { box-shadow: 0 0 0 #2f3542; }
        h1 { margin-bottom: 5px; }
        p { color: #bdc3c7; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>TapTap Cover Image (1920x1080)</h1>
    <p>Gambar resolusi tinggi khusus untuk halaman detail game di TapTap.</p>
    
    <div class="controls">
        <button onclick="downloadCanvas('id')">Download Versi ID 🇮🇩</button>
        <button class="btn-en" onclick="downloadCanvas('en')">Download Versi EN 🇺🇸</button>
    </div>

    <div>
        <h3>Preview Versi Indonesia</h3>
        <canvas id="taptapID" width="1920" height="1080"></canvas>
    </div>
    
    <div>
        <h3>Preview Versi English</h3>
        <canvas id="taptapEN" width="1920" height="1080"></canvas>
    </div>

    <script>
        const imgIDFile = "Screenshot_20260712-154047.png"; 
        const imgENFile = "Screenshot_20260712-154042.png"; 

        function drawPremiumBackground(ctx) {
            const grad = ctx.createLinearGradient(0, 0, 1920, 1080);
            grad.addColorStop(0, "#1A2980");
            grad.addColorStop(1, "#26D0CE");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1920, 1080);

            // Gelombang bawah
            ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
            ctx.beginPath();
            ctx.moveTo(1920, 1080);
            ctx.lineTo(600, 1080);
            ctx.quadraticCurveTo(1100, 400, 1920, 200);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(1920, 1080);
            ctx.lineTo(900, 1080);
            ctx.quadraticCurveTo(1300, 600, 1920, 400);
            ctx.closePath();
            ctx.fill();
            
            // Grid background
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 2;
            for (let i = 0; i < 1080; i += 60) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1080); ctx.stroke();
            }
            for (let j = 0; j < 1080; j += 60) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(1080, j); ctx.stroke();
            }
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
        }

        function drawCover(canvasId, imgSrc, title, subtitle1, subtitle2, badgeText) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = imgSrc;
            
            img.onload = () => {
                drawPremiumBackground(ctx);

                // --- BAGIAN HP ---
                const phoneW = 460;
                const phoneH = 1000; 
                const phoneX = 180;
                const phoneY = 100;

                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur = 40;
                ctx.shadowOffsetY = 20;
                ctx.fillStyle = "#1e272e"; 
                roundRect(ctx, phoneX, phoneY, phoneW, phoneH, 50);
                ctx.fill();
                ctx.shadowColor = "transparent";

                ctx.save();
                roundRect(ctx, phoneX+15, phoneY+15, phoneW-30, phoneH-30, 38);
                ctx.clip();
                
                const imgRatio = img.width / img.height;
                const drawH = (phoneW-30) / imgRatio;
                ctx.drawImage(img, phoneX+15, phoneY+15, phoneW-30, drawH);
                
                // Poni HP (Notch)
                ctx.fillStyle = "black";
                roundRect(ctx, phoneX + (phoneW/2) - 80, phoneY + 25, 160, 45, 20);
                ctx.fill();
                ctx.restore();

                // --- BAGIAN TEKS ---
                const textStartX = 750; 
                ctx.textAlign = "left";
                ctx.textBaseline = "top";
                
                // Badge
                ctx.font = "bold 32px 'Segoe UI'";
                const textWidth = ctx.measureText(badgeText).width;
                const badgeWidth = textWidth + 60; 

                ctx.fillStyle = "#F5A623"; 
                roundRect(ctx, textStartX, 280, badgeWidth, 75, 35);
                ctx.fill();
                
                ctx.fillStyle = "#ffffff";
                ctx.fillText(badgeText, textStartX + 30, 298);

                // Judul Besar
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 8;
                ctx.fillStyle = "white";
                ctx.font = "bold 150px 'Arial Black', Impact, sans-serif";
                ctx.fillText("KoinKita", textStartX, 380);
                
                // Subtitle Kuning
                ctx.font = "bold 70px 'Segoe UI', Arial, sans-serif";
                ctx.fillStyle = "#F8E71C"; 
                ctx.fillText(title, textStartX, 580);
                
                // Subtitle Putih
                ctx.fillStyle = "white";
                ctx.font = "55px 'Segoe UI', Arial, sans-serif";
                ctx.fillText(subtitle1, textStartX, 680);
                ctx.fillText(subtitle2, textStartX, 760);
                
                ctx.shadowColor = "transparent";
            };
        }

        drawCover(
            'taptapID', 
            imgIDFile, 
            "Keputusan Finansialmu!", 
            "Simulasi seru menghadapi resiko", 
            "dan peluang keuangan nyata.",
            "🎮 GAME LITERASI KEUANGAN"
        );

        drawCover(
            'taptapEN', 
            imgENFile, 
            "Your Financial Choices!", 
            "A fun simulation of real-world", 
            "financial risks & opportunities.",
            "🎮 FINANCIAL LITERACY GAME"
        );

        function downloadCanvas(lang) {
            try {
                const canvas = document.getElementById(lang === 'id' ? 'taptapID' : 'taptapEN');
                const link = document.createElement('a');
                link.download = `TapTap_Cover_${lang.toUpperCase()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert("Gagal mengunduh. Pastikan buka lewat localhost:8080");
            }
        }
    </script>
</body>
</html>
